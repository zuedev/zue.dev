<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zue.dev</title>
    <meta
      name="description"
      content="Cloud Specialist. Gaming Enthusiast. Open Source Fanatic."
    />
    <style>
      /* import Inter font */
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      /* apply Inter font to entire html document */
      html {
        font-family: "Inter";
      }

      /* remove margin and padding from body */
      body {
        margin: 0;
        padding: 0;
      }

      /* remove top margin from first-child h1 of element */
      h1:first-child {
        margin-top: 0;
      }

      /* make body full height */
      body {
        height: 100vh;
      }

      /* center content of body using flexbox */
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* fade in animation */
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* fade in body content */
      body {
        opacity: 0;
        animation: fadeIn 1s ease-in-out forwards;
      }

      /* accomodate dark mode users defaults */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: black;
          color: white;
        }
      }

      /* make text pan :3 */
      .pan {
        background: linear-gradient(
          45deg,
          #ff1b8d 33%,
          #ffd800 33%,
          #ffd800 66%,
          #21b1ff 66%
        );
        background-clip: text;
        -webkit-text-fill-color: transparent;
        /* shrink to fit to fix background */
        display: inline;
      }

      /* link styles */
      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        background: black;
        color: white;

        @media (prefers-color-scheme: dark) {
          background: white;
          color: black;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
      import React from "https://esm.sh/react@18";
      import ReactDOM from "https://esm.sh/react-dom@18/client";

      ReactDOM.createRoot(document.body).render(
        <main style={{ maxWidth: "666px", padding: "20px" }}>
          <h1 className="pan">zuedev</h1>
          <p
            style={{
              textAlign: "justify",
            }}
          >
            Cloud Specialist. Gaming Enthusiast. Open Source Fanatic.
          </p>

          <article>
            <h2>What am I working on?</h2>
            <ul style={{ listStyleType: "square" }}>
              {[
                {
                  role: "Lead Developer",
                  connective: "at",
                  place: "Blue Bean Games",
                  url: "https://zue.dev/bbg",
                },
                {
                  role: "Director",
                  connective: "at",
                  place: "Unnamed Group",
                  url: "https://unnamed.group/",
                },
                {
                  role: "Manager",
                  connective: "for",
                  place: "YayJayBae",
                  url: "https://yayjaybae.com/",
                },
              ].map((project, index) => (
                <li key={index}>
                  <a href={project.url}>
                    <b>{project.role}</b> {project.connective} {project.place}
                  </a>
                </li>
              ))}
            </ul>
          </article>
        </main>,
      );
    </script>
  </body>
</html>
